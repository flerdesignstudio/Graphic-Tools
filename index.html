<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fler Design Studio Tools</title>
    <link rel="stylesheet" href="src/styles/global.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* Tool Navigation Styles */
        #app-navigation {
            display: flex;
            gap: 8px;
            padding: 0 16px 16px 16px;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--border-subtle);
            margin-bottom: 4px;
        }
        
        .nav-btn {
            flex: 1;
            min-width: 80px;
            text-align: center;
        }

        .nav-btn .icon {
            font-size: 14px;
        }

        #tool-sidebar-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding: 16px 16px 20px 16px;
        }
    </style>
</head>

<body>
    <div class="app-layout">
        <aside class="sidebar">
            <header class="sidebar-header">
                <h1>FlerTools</h1>
                <p>Make the best of it</p>
            </header>

            <!-- Global App Navigation Switcher -->
            <div id="app-navigation"></div>

            <!-- Dynamic Sidebar Injection Container -->
            <div class="sidebar-content" id="tool-sidebar-container">
            </div>
        </aside>

        <!-- Dynamic Main Canvas Injection Container -->
        <main class="canvas-container" id="tool-main-container">
        </main>
    </div>

    <script type="module" src="/src/app.js"></script>
</body>

</html>
